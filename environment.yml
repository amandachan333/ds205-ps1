name: food
channels:
  - defaults
  - conda-forge
dependencies:
  # Core
  - python=3.12.12
  - ipykernel=7.1.0
  - ipython=9.9.0
  
  # Data collection (Part A: Scraper)
  - requests=2.32.5
  - scrapy=2.14.1
  - selenium=4.38.0
  
  # Data manipulation (Both)
  - numpy=2.3.1
  - pandas=2.3.3
  
  # API development (Part B: API)
  - fastapi=0.128.0
  - pydantic=2.12.4
  - uvicorn=0.40.0
  - httpx=0.28.1
  
  # Testing (Both)
  - pytest=8.4.2
